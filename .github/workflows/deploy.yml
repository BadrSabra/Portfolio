name: Build & Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio
        env:
          BASE_PATH: /Portfolio/
          VITE_FORMSPREE_ID: ${{ secrets.VITE_FORMSPREE_ID }}
          NODE_ENV: production
        run: pnpm --filter @workspace/portfolio run build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: artifacts/portfolio/dist/public
          branch: gh-pages
          clean: true
