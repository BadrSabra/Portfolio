<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Badr Aldien Sabra — Portfolio</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Encodes the requested path into ?/ so index.html can restore it.
    // segment = 1 matches the /Portfolio base path depth.
    var segment = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segment).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segment).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
